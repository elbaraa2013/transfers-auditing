kind = "mobile"
previewPath = "/mobile/"
title = "تدقيق الحوالات — موبايل"
version = "1.0.0"
id = "artifacts/hawala-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19925

[services.development]
run = "pnpm --filter @workspace/hawala-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hawala-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hawala-mobile", "run", "serve" ]

[services.env]
PORT = "19925"
BASE_PATH = "/mobile/"
