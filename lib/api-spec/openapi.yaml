openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: نظام تدقيق الحوالات API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transfers
    description: إدارة الحوالات
  - name: agents
    description: المناديب
  - name: scan
    description: مسح الحوالات بالذكاء الاصطناعي
  - name: messages
    description: رسائل واتساب
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transfers:
    get:
      operationId: listTransfers
      tags: [transfers]
      summary: قائمة الحوالات
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: agentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: قائمة الحوالات
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transfer"
    post:
      operationId: createTransfer
      tags: [transfers]
      summary: إضافة حوالة جديدة
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "201":
          description: تم الإنشاء
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/cash:
    post:
      operationId: createCashPayment
      tags: [transfers]
      summary: تسجيل دفعة نقدية
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashPaymentInput"
      responses:
        "201":
          description: تم التسجيل
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          description: بيانات غير صحيحة
        "404":
          description: المندوب غير موجود

  /transfers/stats:
    get:
      operationId: getTransferStats
      tags: [transfers]
      summary: إحصائيات الحوالات للوحة التحكم
      responses:
        "200":
          description: الإحصائيات
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferStats"

  /transfers/pending:
    get:
      operationId: listPendingTransfers
      tags: [transfers]
      summary: الحوالات المعلقة للمطابقة اليومية
      responses:
        "200":
          description: الحوالات المعلقة
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transfer"

  /transfers/{id}:
    get:
      operationId: getTransfer
      tags: [transfers]
      summary: تفاصيل حوالة
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: الحوالة
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: غير موجود
    delete:
      operationId: deleteTransfer
      tags: [transfers]
      summary: حذف حوالة
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: تم الحذف
        "404":
          description: غير موجود
        "409":
          description: لا يمكن حذف حوالة معتمدة

  /transfers/{id}/approve:
    patch:
      operationId: approveTransfer
      tags: [transfers]
      summary: اعتماد حوالة
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: تم الاعتماد
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: غير موجود
        "409":
          description: الحوالة مقفلة

  /transfers/{id}/agent:
    patch:
      operationId: changeTransferAgent
      tags: [transfers]
      summary: تغيير مندوب الحوالة قبل الاعتماد
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAgentInput"
      responses:
        "200":
          description: تم تغيير المندوب
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: غير موجود
        "409":
          description: الحوالة مقفلة

  /transfers/{id}/reject:
    patch:
      operationId: rejectTransfer
      tags: [transfers]
      summary: رفض حوالة
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: تم الرفض
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "404":
          description: غير موجود
        "409":
          description: الحوالة مقفلة

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: قائمة المناديب
      responses:
        "200":
          description: المناديب
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: إضافة مندوب جديد
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: تم الإنشاء
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: بيانات غير صحيحة

  /agents/inactive:
    get:
      operationId: listInactiveAgents
      tags: [agents]
      summary: تقرير المناديب الخاملين أكثر من 48 ساعة
      responses:
        "200":
          description: المناديب الخاملون
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InactiveAgent"

  /agents/summary:
    get:
      operationId: getAgentsSummary
      tags: [agents]
      summary: ملخص حوالات كل المناديب مع الإجماليات
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: to
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: ملخص المناديب
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentsSummary"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: تفاصيل مندوب
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: المندوب
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: غير موجود
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: تعديل بيانات مندوب
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "200":
          description: تم التعديل
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: بيانات غير صحيحة
        "404":
          description: غير موجود

  /agents/{id}/statement:
    get:
      operationId: getAgentStatement
      tags: [agents]
      summary: كشف حساب مندوب
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: كشف الحساب
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatement"
        "404":
          description: غير موجود

  /scan:
    post:
      operationId: scanTransferImage
      tags: [scan]
      summary: مسح صورة حوالة بالذكاء الاصطناعي
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: البيانات المستخرجة
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: خطأ في المعالجة

  /messages:
    get:
      operationId: listConversations
      tags: [messages]
      summary: قائمة المحادثات
      responses:
        "200":
          description: المحادثات
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/{agentId}:
    get:
      operationId: getConversation
      tags: [messages]
      summary: محادثة مع مندوب
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: الرسائل
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transfer:
      type: object
      required:
        - id
        - operationNumber
        - amount
        - status
        - riskLevel
        - riskScore
        - agentId
        - agentName
        - paymentMethod
        - createdAt
      properties:
        id:
          type: integer
        operationNumber:
          type: string
        amount:
          type: number
        fromAccount:
          type: ["string", "null"]
        toAccount:
          type: ["string", "null"]
        recipientName:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        riskLevel:
          type: string
          enum: [low, medium, high]
        riskScore:
          type: number
        agentId:
          type: integer
        agentName:
          type: string
        rejectionReason:
          type: ["string", "null"]
        transferDate:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [bankak, cash]
        createdAt:
          type: string

    TransferInput:
      type: object
      required:
        - operationNumber
        - amount
        - agentId
        - riskScore
      properties:
        operationNumber:
          type: string
        amount:
          type: number
        fromAccount:
          type: string
        toAccount:
          type: string
        recipientName:
          type: string
        comment:
          type: string
        agentId:
          type: integer
        riskScore:
          type: number
        transferDate:
          type: string

    CashPaymentInput:
      type: object
      required:
        - agentId
        - amount
      properties:
        agentId:
          type: integer
        amount:
          type: number
        recipientName:
          type: string
        comment:
          type: string
        transferDate:
          type: string

    RejectInput:
      type: object
      properties:
        reason:
          type: string

    TransferStats:
      type: object
      required:
        - total
        - pending
        - approved
        - rejected
        - totalAmount
        - pendingAmount
        - approvedAmount
        - rejectedAmount
      properties:
        total:
          type: integer
        pending:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        totalAmount:
          type: number
        pendingAmount:
          type: number
        approvedAmount:
          type: number
        rejectedAmount:
          type: number

    Agent:
      type: object
      required:
        - id
        - name
        - phone
        - balance
        - lastActivityAt
        - totalTransfers
        - pendingTransfers
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        balance:
          type: number
        lastActivityAt:
          type: string
        totalTransfers:
          type: integer
        pendingTransfers:
          type: integer

    InactiveAgent:
      type: object
      required:
        - id
        - name
        - phone
        - lastActivityAt
        - inactiveHours
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        lastActivityAt:
          type: string
        inactiveHours:
          type: number

    AgentInput:
      type: object
      required:
        - name
        - phone
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1

    ChangeAgentInput:
      type: object
      required:
        - agentId
      properties:
        agentId:
          type: integer

    AgentStatement:
      type: object
      required:
        - agent
        - balance
        - transfers
        - summary
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        balance:
          type: number
        summary:
          $ref: "#/components/schemas/StatementSummary"
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/Transfer"

    StatementSummary:
      type: object
      required:
        - totalCount
        - approvedCount
        - pendingCount
        - rejectedCount
        - totalAmount
        - approvedAmount
        - pendingAmount
        - rejectedAmount
      properties:
        totalCount:
          type: integer
        approvedCount:
          type: integer
        pendingCount:
          type: integer
        rejectedCount:
          type: integer
        totalAmount:
          type: number
        approvedAmount:
          type: number
        pendingAmount:
          type: number
        rejectedAmount:
          type: number

    SummaryTotals:
      type: object
      required:
        - totalCount
        - totalAmount
        - approvedCount
        - approvedAmount
        - pendingCount
        - pendingAmount
        - rejectedCount
        - rejectedAmount
      properties:
        totalCount:
          type: integer
        totalAmount:
          type: number
        approvedCount:
          type: integer
        approvedAmount:
          type: number
        pendingCount:
          type: integer
        pendingAmount:
          type: number
        rejectedCount:
          type: integer
        rejectedAmount:
          type: number

    AgentSummaryRow:
      type: object
      required:
        - agentId
        - agentName
        - totalCount
        - totalAmount
        - approvedCount
        - approvedAmount
        - pendingCount
        - pendingAmount
        - rejectedCount
        - rejectedAmount
      properties:
        agentId:
          type: integer
        agentName:
          type: string
        totalCount:
          type: integer
        totalAmount:
          type: number
        approvedCount:
          type: integer
        approvedAmount:
          type: number
        pendingCount:
          type: integer
        pendingAmount:
          type: number
        rejectedCount:
          type: integer
        rejectedAmount:
          type: number

    AgentsSummary:
      type: object
      required:
        - agents
        - totals
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentSummaryRow"
        totals:
          $ref: "#/components/schemas/SummaryTotals"

    ScanInput:
      type: object
      required:
        - imageBase64
      properties:
        imageBase64:
          type: string

    ScanResult:
      type: object
      required:
        - operationNumber
        - amount
        - fromAccount
        - toAccount
        - recipientName
        - transferDate
        - riskScore
        - confidence
      properties:
        operationNumber:
          type: ["string", "null"]
        amount:
          type: ["number", "null"]
        fromAccount:
          type: ["string", "null"]
        toAccount:
          type: ["string", "null"]
        recipientName:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        transferDate:
          type: ["string", "null"]
        riskScore:
          type: number
        confidence:
          type: number

    Conversation:
      type: object
      required:
        - agentId
        - agentName
        - lastMessage
        - lastMessageAt
        - unreadCount
      properties:
        agentId:
          type: integer
        agentName:
          type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
        unreadCount:
          type: integer

    Message:
      type: object
      required:
        - id
        - agentId
        - content
        - type
        - direction
        - sentAt
      properties:
        id:
          type: integer
        agentId:
          type: integer
        content:
          type: string
        type:
          type: string
          enum: [text, image]
        direction:
          type: string
          enum: [incoming, outgoing]
        imageUrl:
          type: ["string", "null"]
        sentAt:
          type: string
